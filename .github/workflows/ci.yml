name: MATLAB CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: latest

      - name: Run unit tests
        uses: matlab-actions/run-command@v2
        with:
          command: addpath('src'); results = runtests('tests/FiscalAIClientTest.m'); assertSuccess(results)

      - name: Run Code Analyzer
        uses: matlab-actions/run-command@v2
        with:
          command: issues = [checkcode('src/+fiscalai/FiscalAIClient.m','-struct'); checkcode('tests/FiscalAIClientTest.m','-struct'); checkcode('tests/FiscalAIIntegrationTest.m','-struct'); checkcode('tests/helpers/MockTransport.m','-struct'); checkcode('tools/packageToolbox.m','-struct'); checkcode('tools/smokeFiscalAI.m','-struct')]; assert(isempty(issues), evalc('disp(issues)'))
